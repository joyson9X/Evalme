<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SQL Basics — Learn SQL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ────────────────────────────── */
:root {
  --black:      #080808;
  --s1:         #0F0F0F;
  --s2:         #161616;
  --s3:         #1E1E1E;
  --s4:         #272727;
  --line:       #282828;
  --line2:      #333333;
  --y:          #F5C400;
  --y-dim:      rgba(245,196,0,0.07);
  --y-dim2:     rgba(245,196,0,0.13);
  --y-dk:       #C29B00;
  --fg:         #E8E8E8;
  --fg2:        #999999;
  --fg3:        #555555;
  --fg4:        #333333;
  --green:      #34C77B;
  --green-dim:  rgba(52,199,123,0.07);
  --red:        #E85555;
  --red-dim:    rgba(232,85,85,0.07);
  --kw:         #C792EA;
  --col:        #89DDFF;
  --tbl:        #FFCB6B;
  --val:        #C3E88D;
  --op:         #F78C6C;
  --cmt:        #4A5568;
  --sans:       'Figtree', sans-serif;
  --mono:       'JetBrains Mono', monospace;
}

/* ── RESET ──────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--black);
  color: var(--fg);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── HEADER ─────────────────────────────── */
.hdr {
  width: 100%;
  background: var(--s1);
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  z-index: 100;
}
.hdr-inner {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 28px;
  height: 54px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.logo {
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--y);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}
.logo-sep { color: var(--fg3); margin: 0 5px; }
.hdr-lesson {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--fg3);
  flex-shrink: 0;
  white-space: nowrap;
  letter-spacing: 0.05em;
}
.progress-track {
  flex: 1;
  height: 1px;
  background: var(--s4);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--y);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
}

/* ── STAGE PIPS ─────────────────────────── */
.stage-strip {
  width: 100%;
  max-width: 760px;
  padding: 18px 28px 0;
  display: flex;
  gap: 3px;
}
.s-pip {
  flex: 1;
  height: 1px;
  background: var(--s4);
  transition: background 0.3s;
}
.s-pip.done   { background: var(--fg3); }
.s-pip.active { background: var(--y); }

/* ── MAIN ───────────────────────────────── */
.main {
  width: 100%;
  max-width: 760px;
  padding: 22px 28px 110px;
  flex: 1;
}

/* ── CARD ───────────────────────────────── */
.card {
  background: var(--s1);
  border: 1px solid var(--line);
  padding: 36px 40px 32px;
  animation: cardIn 0.2s ease-out;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Stage label */
.s-label {
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--y);
  border-left: 2px solid var(--y);
  padding-left: 9px;
  margin-bottom: 22px;
  display: block;
}

/* Card title */
.card-title {
  font-size: 1.28rem;
  font-weight: 600;
  line-height: 1.3;
  color: var(--fg);
  margin-bottom: 18px;
  letter-spacing: -0.015em;
}

/* Body copy */
.body {
  font-size: 0.925rem;
  font-weight: 400;
  line-height: 1.9;
  color: var(--fg2);
}
.body strong { color: var(--fg); font-weight: 600; }
.body .tag {
  font-family: var(--mono);
  font-size: 0.8em;
  background: var(--y-dim);
  color: var(--y);
  padding: 2px 7px;
  border: 1px solid rgba(245,196,0,0.18);
}

/* Rule */
.rule { height: 1px; background: var(--line); margin: 24px 0; }

/* Eyebrow */
.eyebrow {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg3);
  margin-bottom: 10px;
}

/* ── DATA TABLE ─────────────────────────── */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--line); margin: 12px 0; }
.d-table {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.74rem;
  width: 100%;
  min-width: 360px;
}
.d-table th {
  background: var(--s2);
  color: var(--y);
  font-weight: 600;
  padding: 8px 16px;
  text-align: left;
  border-bottom: 1px solid var(--line);
  letter-spacing: 0.04em;
}
.d-table td {
  padding: 7px 16px;
  border-bottom: 1px solid var(--line);
  color: var(--fg2);
  font-size: 0.73rem;
}
.d-table tr:last-child td { border-bottom: none; }
.d-table tr:hover td { background: var(--s2); }

/* ── CODE CARD ──────────────────────────── */
.code-card {
  background: var(--s2);
  border: 1px solid var(--line);
  margin: 12px 0;
  overflow: hidden;
}
.code-bar {
  background: var(--s3);
  border-bottom: 1px solid var(--line);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.code-bar-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--fg4);
}
.code-bar-dot.y { background: var(--y); opacity: 0.5; }
.code-filename {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--fg3);
  margin-left: 6px;
  letter-spacing: 0.06em;
}
.code-body { padding: 18px 22px; }
.anno-row {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding: 2px 0;
}
.code-line {
  font-family: var(--mono);
  font-size: 0.83rem;
  line-height: 1.75;
  color: #CDD6F4;
  flex: 1;
  white-space: pre-wrap;
}
.anno-note {
  font-size: 0.68rem;
  color: var(--fg3);
  line-height: 1.55;
  padding-top: 4px;
  width: 155px;
  flex-shrink: 0;
  font-family: var(--sans);
  border-left: 1px solid var(--line);
  padding-left: 14px;
  font-weight: 400;
}
.anno-note strong { color: var(--col); font-weight: 500; }
.kw  { color: var(--kw);  font-weight: 600; }
.col { color: var(--col); }
.tbl { color: var(--tbl); }
.val { color: var(--val); }
.op  { color: var(--op);  }

/* ── RESULT TABLE ───────────────────────── */
.res-section { margin-top: 18px; animation: cardIn 0.2s ease-out; }
.res-eyebrow {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.res-eyebrow::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--green);
}
.res-tbl-wrap { overflow-x: auto; border: 1px solid rgba(52,199,123,0.15); }
.r-table {
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 0.73rem;
  width: 100%;
  min-width: 260px;
}
.r-table th {
  background: var(--green-dim);
  color: var(--green);
  font-weight: 600;
  padding: 7px 14px;
  text-align: left;
  border-bottom: 1px solid rgba(52,199,123,0.12);
  letter-spacing: 0.04em;
}
.r-table td {
  padding: 6px 14px;
  border-bottom: 1px solid rgba(52,199,123,0.06);
  color: var(--fg2);
}
.r-table tr:last-child td { border-bottom: none; }
.row-count {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--fg3);
  margin-top: 6px;
  letter-spacing: 0.04em;
}

/* ── FILL IN BLANK ──────────────────────── */
.blank-code {
  background: var(--s2);
  border: 1px solid var(--line);
  padding: 18px 22px;
  font-family: var(--mono);
  font-size: 0.88rem;
  line-height: 2;
  color: #CDD6F4;
  margin: 14px 0 18px;
  overflow-x: auto;
}
.blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 1px solid var(--y);
  color: var(--y);
  font-weight: 600;
  text-align: center;
  padding: 0 4px;
  vertical-align: middle;
  transition: all 0.15s;
}
.blank.ok  { color: var(--green); border-bottom-color: var(--green); }
.blank.err { color: var(--red);   border-bottom-color: var(--red);   }

.chip-grid { display: flex; flex-wrap: wrap; gap: 7px; margin: 0 0 6px; }
.chip {
  padding: 6px 15px;
  border: 1px solid var(--line2);
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  background: var(--s2);
  color: var(--fg2);
  transition: all 0.12s;
  user-select: none;
}
.chip:hover:not(.off) { border-color: var(--y); color: var(--y); background: var(--y-dim); }
.chip.sel { border-color: var(--y); color: var(--y); background: var(--y-dim2); }
.chip.ok  { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.chip.err { border-color: var(--red);   color: var(--red);   background: var(--red-dim);   }
.chip.off { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

/* ── JUMBLE ─────────────────────────────── */
.jzone-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg3);
  margin-bottom: 8px;
}
.jzone {
  min-height: 50px;
  background: var(--s2);
  border: 1px solid var(--line2);
  border-style: dashed;
  padding: 10px 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 14px;
  transition: border-color 0.2s, background 0.2s;
}
.jzone.ok-zone  { border-color: var(--green); background: var(--green-dim); border-style: solid; }
.jzone.err-zone { border-color: var(--red);   background: var(--red-dim);   border-style: solid; }
.jzone-ph {
  font-size: 0.74rem;
  color: var(--fg4);
  font-style: normal;
  pointer-events: none;
  font-family: var(--sans);
  font-weight: 400;
}
.jchip {
  padding: 5px 12px;
  border: 1px solid var(--line2);
  font-family: var(--mono);
  font-size: 0.77rem;
  font-weight: 500;
  cursor: pointer;
  background: var(--s3);
  color: var(--fg2);
  transition: all 0.12s;
  user-select: none;
}
.jchip:hover    { border-color: var(--y); color: var(--y); }
.jchip.placed   { background: var(--y-dim2); border-color: var(--y); color: var(--y); }
.jchip.ok       { background: var(--green-dim); border-color: var(--green); color: var(--green); }
.jchip.err      { background: var(--red-dim);   border-color: var(--red);   color: var(--red);   }
.jchip.used     { opacity: 0.15; cursor: not-allowed; pointer-events: none; }

/* ── MCQ ────────────────────────────────── */
.mcq-q {
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.65;
  color: var(--fg);
  margin-bottom: 18px;
  letter-spacing: -0.005em;
}
.opt-list { display: flex; flex-direction: column; gap: 7px; }
.opt {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 11px 14px;
  border: 1px solid var(--line);
  cursor: pointer;
  font-size: 0.84rem;
  font-weight: 400;
  background: var(--s2);
  color: var(--fg2);
  transition: all 0.12s;
  user-select: none;
  font-family: var(--sans);
}
.opt:hover:not(.locked) { border-color: var(--y); color: var(--fg); background: var(--y-dim); }
.opt.sel  { border-color: var(--y);     color: var(--fg);    background: var(--y-dim2);   }
.opt.ok   { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.opt.err  { border-color: var(--red);   color: var(--red);   background: var(--red-dim);   }
.opt-key {
  width: 22px; height: 22px;
  border: 1px solid var(--line2);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--fg3);
  transition: all 0.12s;
}
.opt.sel  .opt-key { background: var(--y);     border-color: var(--y);     color: var(--black); }
.opt.ok   .opt-key { background: var(--green); border-color: var(--green); color: var(--black); }
.opt.err  .opt-key { background: var(--red);   border-color: var(--red);   color: #fff; }

/* ── WRITE QUERY ─────────────────────────── */
.task-header {
  background: var(--s3);
  border: 1px solid var(--line);
  border-bottom: none;
  padding: 10px 16px;
  font-size: 0.8rem;
  color: var(--fg2);
  line-height: 1.55;
  font-weight: 400;
}
.task-header strong { color: var(--fg); font-weight: 600; }
textarea {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--line);
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 0.83rem;
  color: #CDD6F4;
  resize: vertical;
  min-height: 78px;
  outline: none;
  transition: border-color 0.15s;
  display: block;
  border-top: none;
}
textarea:focus { border-color: var(--y); }
textarea.ok    { border-color: var(--green); }
textarea.err   { border-color: var(--red); }
.hint-line {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--fg3);
  margin-top: 8px;
  letter-spacing: 0.01em;
}
.hint-line span { color: var(--y); font-weight: 500; }

/* ── FEEDBACK ───────────────────────────── */
.fb {
  margin-top: 12px;
  padding: 10px 14px;
  font-size: 0.78rem;
  font-weight: 500;
  line-height: 1.5;
  display: none;
  border-left: 2px solid transparent;
  font-family: var(--sans);
  letter-spacing: 0.005em;
}
.fb.show { display: block; }
.fb.good { background: var(--green-dim); color: var(--green); border-left-color: var(--green); }
.fb.bad  { background: var(--red-dim);   color: var(--red);   border-left-color: var(--red);   }

/* ── ACTION BAR ─────────────────────────── */
.action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--s1);
  border-top: 1px solid var(--line);
  padding: 12px 28px;
  z-index: 99;
}
.action-inner {
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
}

/* Buttons */
.btn {
  padding: 9px 22px;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 0.82rem;
  cursor: pointer;
  border: none;
  transition: all 0.13s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  letter-spacing: 0.01em;
}
.btn-primary {
  background: var(--y);
  color: var(--black);
  border: 1px solid var(--y-dk);
}
.btn-primary:hover:not(:disabled) { background: #FFD426; }
.btn-primary:disabled { opacity: 0.2; cursor: not-allowed; }
.btn-ghost {
  background: transparent;
  color: var(--fg2);
  border: 1px solid var(--line2);
}
.btn-ghost:hover { border-color: var(--fg3); color: var(--fg); }
.btn-danger {
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(232,85,85,0.22);
}
.btn-danger:hover { background: rgba(232,85,85,0.13); }

/* ── COMPLETE ───────────────────────────── */
.done-screen { text-align: center; padding: 28px 0 16px; }
.done-mark {
  display: block;
  width: 48px; height: 48px;
  border: 1px solid var(--y);
  margin: 0 auto 24px;
  position: relative;
}
.done-mark::after {
  content: '';
  display: block;
  width: 20px; height: 10px;
  border-left: 2px solid var(--y);
  border-bottom: 2px solid var(--y);
  transform: rotate(-45deg);
  position: absolute;
  top: 16px; left: 14px;
}
.done-screen h2 {
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--fg);
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}
.done-screen p {
  color: var(--fg2);
  font-size: 0.88rem;
  line-height: 1.8;
  max-width: 340px;
  margin: 0 auto 28px;
  font-weight: 400;
}
.done-screen .btn { margin: 0 auto; }

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 600px) {
  .card { padding: 24px 20px 22px; }
  .card-title { font-size: 1.1rem; }
  .anno-row { flex-direction: column; gap: 6px; }
  .anno-note {
    width: 100%;
    border-left: none;
    border-top: 1px solid var(--line);
    padding-left: 0;
    padding-top: 7px;
    margin-top: 2px;
  }
  .action-bar { padding: 10px 16px; }
  .btn { padding: 9px 16px; font-size: 0.8rem; }
  .hdr-inner { padding: 0 16px; gap: 14px; }
  .stage-strip { padding: 14px 16px 0; }
  .main { padding: 18px 16px 100px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="logo">SQL<span class="logo-sep">/</span>basics</div>
    <div class="progress-track"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="hdr-lesson" id="pLabel">01 / 08</div>
  </div>
</header>

<!-- STAGE PIPS -->
<div class="stage-strip" id="stagePips"></div>

<!-- MAIN -->
<main class="main"><div class="card" id="card"></div></main>

<!-- ACTION BAR -->
<div class="action-bar"><div class="action-inner" id="actionBar"></div></div>

<script>
/* ════════════════════════════════════════
   MINI SQL ENGINE
════════════════════════════════════════ */
const DB=[
  {id:1,name:"Alice",  department:"Engineering",salary:72000},
  {id:2,name:"Bob",    department:"HR",         salary:48000},
  {id:3,name:"Carol",  department:"Engineering",salary:68000},
  {id:4,name:"David",  department:"Finance",    salary:55000},
  {id:5,name:"Eva",    department:"HR",         salary:51000},
];
const COLS=["id","name","department","salary"];

function runSQL(q){
  let rows=DB.map(r=>({...r}));
  const u=q.toUpperCase().replace(/\s+/g,' ').trim();
  let cols=COLS;
  const sm=u.match(/^SELECT\s+(.+?)\s+FROM/);
  if(sm){ const r=sm[1].trim(); if(r!=='*') cols=r.split(',').map(c=>c.trim().toLowerCase()); }
  const wm=u.match(/WHERE\s+(.+?)(?:\s+ORDER|$)/);
  if(wm){
    const c=wm[1];
    if(/\sOR\s/.test(c)) rows=rows.filter(r=>c.split(/\sOR\s/i).some(p=>ec(p.trim(),r)));
    else if(/\sAND\s/.test(c)) rows=rows.filter(r=>c.split(/\sAND\s/i).every(p=>ec(p.trim(),r)));
    else rows=rows.filter(r=>ec(c.trim(),r));
  }
  const om=u.match(/ORDER\s+BY\s+(\w+)(?:\s+(ASC|DESC))?/);
  if(om){ const col=om[1].toLowerCase(),dir=om[2]==='DESC'?-1:1; rows.sort((a,b)=>a[col]<b[col]?-dir:a[col]>b[col]?dir:0); }
  rows=rows.map(r=>{ const o={}; cols.forEach(c=>{ if(c in r) o[c]=r[c]; }); return o; });
  return {cols,rows};
}
function ec(c,row){
  let m;
  if((m=c.match(/^(\w+)\s*=\s*'([^']+)'$/i))) return String(row[m[1].toLowerCase()])===m[2];
  if((m=c.match(/^(\w+)\s*=\s*(\d+)$/i)))     return row[m[1].toLowerCase()]==Number(m[2]);
  if((m=c.match(/^(\w+)\s*>\s*(\d+)$/i)))     return row[m[1].toLowerCase()]>Number(m[2]);
  if((m=c.match(/^(\w+)\s*<\s*(\d+)$/i)))     return row[m[1].toLowerCase()]<Number(m[2]);
  return true;
}

function buildResultTable(q){
  const {cols,rows}=runSQL(q);
  if(!rows.length) return `<div class="res-section"><div class="res-eyebrow">Result</div><p style="font-family:var(--font-mono);font-size:0.73rem;color:var(--grey-2)">0 rows returned.</p></div>`;
  let h=`<div class="res-section"><div class="res-eyebrow">Result</div><div class="res-tbl-wrap"><table class="r-table"><thead><tr>`;
  cols.forEach(c=>h+=`<th>${c}</th>`);
  h+=`</tr></thead><tbody>`;
  rows.forEach(r=>{h+=`<tr>`;cols.forEach(c=>h+=`<td>${r[c]??''}</td>`);h+=`</tr>`;});
  h+=`</tbody></table></div><div class="row-count">${rows.length} row${rows.length!==1?'s':''} returned</div></div>`;
  return h;
}

function buildSampleTable(){
  let h=`<div class="eyebrow">Table — employees</div><div class="tbl-wrap"><table class="d-table"><thead><tr>`;
  COLS.forEach(c=>h+=`<th>${c}</th>`);
  h+=`</tr></thead><tbody>`;
  DB.forEach(r=>{h+=`<tr>`;COLS.forEach(c=>h+=`<td>${r[c]}</td>`);h+=`</tr>`;});
  return h+`</tbody></table></div>`;
}

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
function getStages(l){ return l.write?["meaning","example","blank","jumble","mcq","write"]:["meaning","example","blank","jumble","mcq"]; }

let li=0,si=0;
let selOpt=null,mcqLocked=false;
let blankChoice=null,blankChecked=false;
let jPlaced=[],jChecked=false;

function L(){ return LESSONS[li]; }
function stgs(){ return getStages(L()); }
function stg(){ return stgs()[si]; }
function total(){ return LESSONS.reduce((a,l)=>a+(l.write?6:5),0); }
function done(){ let n=0; for(let i=0;i<li;i++) n+=LESSONS[i].write?6:5; return n+si; }

const LABELS={meaning:"Meaning",example:"Example",blank:"Fill the Blank",jumble:"Arrange the Query",mcq:"Quiz",write:"Write the Query"};

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function render(){
  selOpt=null; mcqLocked=false; blankChoice=null; blankChecked=false; jPlaced=[]; jChecked=false;

  // Header progress
  const pct=Math.round(done()/total()*100);
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLabel').textContent=`${String(li+1).padStart(2,'0')} / 08`;

  // Stage pips
  const ss=stgs();
  document.getElementById('stagePips').innerHTML=ss.map((s,i)=>{
    const c=i<si?'done':i===si?'active':'';
    return `<div class="s-pip ${c}" title="${LABELS[s]}"></div>`;
  }).join('');

  // Animate card
  const card=document.getElementById('card');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation='cardIn 0.22s ease-out';

  const l=L(), s=stg();
  let html='', bar='';

  /* ── MEANING ── */
  if(s==='meaning'){
    html+=label('meaning');
    html+=`<div class="card-title">${l.title}</div>`;
    html+=`<p class="body">${l.meaning}</p>`;
    if(l.showTable){ html+=`<div class="rule"></div>`+buildSampleTable(); }
    bar=primary('Continue →','advance()');
  }

  /* ── EXAMPLE ── */
  else if(s==='example'){
    html+=label('example');
    html+=`<div class="card-title">Read the Query</div>`;
    if(l.showTable){ html+=buildSampleTable(); html+=`<div class="rule"></div>`; }
    html+=`<div class="eyebrow">Query</div>`;
    html+=`<div class="code-card">`;
    html+=`<div class="code-bar"><div class="code-bar-dot"></div><div class="code-bar-dot y"></div><div class="code-bar-dot"></div><span class="code-filename">query.sql</span></div>`;
    html+=`<div class="code-body">`;
    l.example.lines.forEach(row=>{
      html+=`<div class="anno-row"><div class="code-line">${row.code}</div><div class="anno-note">${row.note}</div></div>`;
    });
    html+=`</div></div>`;
    html+=buildResultTable(l.example.query);
    bar=primary('Got it →','advance()');
  }

  /* ── BLANK ── */
  else if(s==='blank'){
    html+=label('blank');
    html+=`<div class="card-title">Complete the Query</div>`;
    html+=`<p class="body" style="margin-bottom:16px">Select the correct keyword to fill the blank.</p>`;
    const disp=l.blank.template.replace('___',`<span class="blank" id="bSlot">______</span>`);
    html+=`<div class="blank-code">${disp}</div>`;
    html+=`<div class="chip-grid">`;
    l.blank.options.forEach((o,i)=>{ html+=`<div class="chip" id="bc${i}" onclick="pickBlank('${o}',${i})">${o}</div>`; });
    html+=`</div><div class="fb" id="fb"></div>`;
    bar=`<button class="btn btn-primary" id="cb" onclick="checkBlank()" disabled>Check →</button>`;
  }

  /* ── JUMBLE ── */
  else if(s==='jumble'){
    const jw=[...l.jumble.words].sort(()=>Math.random()-0.5);
    html+=label('jumble');
    html+=`<div class="card-title">Arrange the Query</div>`;
    html+=`<p class="body" style="margin-bottom:16px">${l.jumble.prompt}</p>`;
    html+=`<div class="jzone-label">Your query</div>`;
    html+=`<div class="jzone" id="jZone"><span class="jzone-ph" id="jPh">Tap tokens below to place them here...</span></div>`;
    html+=`<div class="jzone-label" style="margin-top:14px">Token bank</div>`;
    html+=`<div class="chip-grid" id="jBank">`;
    jw.forEach((w,i)=>{ html+=`<div class="jchip" id="jc${i}" data-i="${i}" onclick="jPlace(${i},'${w.replace(/'/g,"\\'")}')"> ${w} </div>`; });
    html+=`</div><div class="fb" id="fb"></div>`;
    html+=`<div class="hint-line" id="jHint"></div>`;
    bar=`
      <button class="btn btn-ghost" onclick="jClear()">Clear</button>
      <button class="btn btn-ghost" onclick="jHint()">Hint</button>
      <button class="btn btn-primary" id="cb" onclick="checkJumble()" disabled>Check →</button>`;
  }

  /* ── MCQ ── */
  else if(s==='mcq'){
    html+=label('mcq');
    html+=`<div class="mcq-q">${l.mcq.q}</div>`;
    html+=`<div class="opt-list">`;
    ['A','B','C','D'].forEach((k,i)=>{
      if(!l.mcq.opts[i]) return;
      html+=`<div class="opt" id="oo${i}" onclick="pickMCQ(${i})"><div class="opt-key">${k}</div><span>${l.mcq.opts[i]}</span></div>`;
    });
    html+=`</div><div class="fb" id="fb"></div><div id="mcqRes"></div>`;
    bar=`<button class="btn btn-primary" id="cb" onclick="checkMCQ()" disabled>Check Answer</button>`;
  }

  /* ── WRITE ── */
  else if(s==='write'){
    html+=label('write');
    html+=`<div class="card-title">Write the Query</div>`;
    html+=`<div class="task-header"><strong>Task</strong> ${l.write.prompt}</div>`;
    html+=`<textarea id="ta" placeholder="Type your SQL here…" spellcheck="false" oninput="onType()"></textarea>`;
    html+=`<div class="fb" id="fb"></div>`;
    html+=`<div id="wRes"></div>`;
    html+=`<div class="hint-line" id="wHint"></div>`;
    bar=`
      <button class="btn btn-ghost" onclick="wHint()">Hint</button>
      <button class="btn btn-primary" id="cb" onclick="checkWrite()" disabled>Submit</button>`;
  }

  card.innerHTML=html;
  document.getElementById('actionBar').innerHTML=bar;
}

function label(s){ return `<div class="s-label">${LABELS[s]}</div>`; }
function primary(txt,fn){ return `<button class="btn btn-primary" onclick="${fn}">${txt}</button>`; }

/* ════════════════════════════════════════
   ADVANCE
════════════════════════════════════════ */
function advance(){
  const ss=stgs();
  if(si<ss.length-1){ si++; }
  else { li++; si=0; if(li>=LESSONS.length){ showDone(); return; } }
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ════════════════════════════════════════
   BLANK
════════════════════════════════════════ */
function pickBlank(v,i){
  if(blankChecked) return;
  blankChoice=v;
  document.querySelectorAll('.chip').forEach(el=>el.classList.remove('sel'));
  document.getElementById(`bc${i}`).classList.add('sel');
  const sl=document.getElementById('bSlot');
  sl.textContent=v; sl.className='blank';
  document.getElementById('cb').disabled=false;
}
function checkBlank(){
  blankChecked=true;
  const ok=blankChoice===L().blank.answer;
  document.querySelectorAll('.chip').forEach(el=>{
    el.classList.add('off');
    if(el.textContent.trim()===L().blank.answer) el.classList.add('ok');
    else if(el.textContent.trim()===blankChoice&&!ok) el.classList.add('err');
  });
  const sl=document.getElementById('bSlot');
  sl.className=`blank ${ok?'ok':'err'}`;
  const fb=document.getElementById('fb');
  fb.className=`fb show ${ok?'good':'bad'}`;
  if(ok){
    fb.textContent=`"${blankChoice}" is correct.`;
    setBar(`<button class="btn btn-primary" onclick="advance()">Continue →</button>`);
  } else {
    fb.textContent=`"${blankChoice}" is not right. Try again.`;
    setBar(`<button class="btn btn-danger" onclick="render()">Try Again</button>`);
  }
}

/* ════════════════════════════════════════
   JUMBLE
════════════════════════════════════════ */
function jPlace(i,w){
  if(jChecked) return;
  const chip=document.getElementById(`jc${i}`);
  const zone=document.getElementById('jZone');
  if(chip.classList.contains('placed')){
    chip.classList.remove('placed');
    jPlaced=jPlaced.filter(p=>p.i!==i);
    const zc=zone.querySelector(`[data-zi="${i}"]`);
    if(zc) zone.removeChild(zc);
  } else {
    chip.classList.add('placed');
    jPlaced.push({i,w});
    const zc=document.createElement('div');
    zc.className='jchip placed in-zone';
    zc.setAttribute('data-zi',i);
    zc.textContent=w;
    zc.onclick=()=>jPlace(i,w);
    zone.appendChild(zc);
  }
  const ph=document.getElementById('jPh');
  if(ph) ph.style.display=jPlaced.length?'none':'';
  document.getElementById('cb').disabled=jPlaced.length===0;
}
function jClear(){
  if(jChecked) return;
  jPlaced=[];
  document.querySelectorAll('.jchip').forEach(el=>el.classList.remove('placed','ok','err'));
  document.getElementById('jZone').innerHTML=`<span class="jzone-ph" id="jPh">Tap tokens below to place them here...</span>`;
  document.getElementById('cb').disabled=true;
}
function jHint(){
  const el=document.getElementById('jHint');
  if(el) el.innerHTML=`<span>${L().jumble.answer}</span>`;
}
function checkJumble(){
  jChecked=true;
  const built=jPlaced.map(p=>p.w).join(' ');
  const nm=s=>s.trim().replace(/\s+/g,' ').toLowerCase().replace(/;$/,'');
  const ok=nm(built)===nm(L().jumble.answer);
  const zone=document.getElementById('jZone');
  zone.classList.add(ok?'ok-zone':'err-zone');
  zone.querySelectorAll('.jchip').forEach(el=>el.classList.add(ok?'ok':'err'));
  const fb=document.getElementById('fb');
  fb.className=`fb show ${ok?'good':'bad'}`;
  if(ok){
    fb.textContent='Correct order. That is a valid SQL query.';
    setBar(`<button class="btn btn-primary" onclick="advance()">Continue →</button>`);
  } else {
    fb.textContent='The order is not quite right. Try rearranging.';
    setBar(`
      <button class="btn btn-ghost" onclick="jHint()">Hint</button>
      <button class="btn btn-danger" onclick="render()">Try Again</button>`);
  }
}

/* ════════════════════════════════════════
   MCQ
════════════════════════════════════════ */
function pickMCQ(i){
  if(mcqLocked) return;
  selOpt=i;
  document.querySelectorAll('.opt').forEach((el,idx)=>el.classList.toggle('sel',idx===i));
  document.getElementById('cb').disabled=false;
}
function checkMCQ(){
  if(mcqLocked) return;
  mcqLocked=true;
  const l=L(); const ok=selOpt===l.mcq.ans;
  document.querySelectorAll('.opt').forEach((el,idx)=>{
    el.classList.add('locked'); el.classList.remove('sel');
    if(idx===l.mcq.ans) el.classList.add('ok');
    else if(idx===selOpt&&!ok) el.classList.add('err');
  });
  const fb=document.getElementById('fb');
  fb.className=`fb show ${ok?'good':'bad'}`;
  if(ok){
    fb.textContent=l.mcq.explain;
    document.getElementById('mcqRes').innerHTML=buildResultTable(l.mcq.query);
    setBar(`<button class="btn btn-primary" onclick="advance()">Continue →</button>`);
  } else {
    fb.textContent='Incorrect. Try again.';
    setBar(`<button class="btn btn-danger" onclick="render()">Try Again</button>`);
  }
}

function onType(){ document.getElementById('cb').disabled=document.getElementById('ta').value.trim().length===0; }
function nm(s){ return s.trim().replace(/\s+/g,' ').toLowerCase().replace(/;$/,''); }
function checkWrite(){
  const l=L(), inp=document.getElementById('ta').value;
  const ok=nm(inp)===nm(l.write.answer);
  const ta=document.getElementById('ta');
  ta.classList.remove('ok','err'); ta.classList.add(ok?'ok':'err');
  const fb=document.getElementById('fb');
  fb.className=`fb show ${ok?'good':'bad'}`;
  if(ok){
    fb.textContent='Your query is correct.';
    document.getElementById('wRes').innerHTML=buildResultTable(inp);
    const isLast=li===LESSONS.length-1&&si===stgs().length-1;
    setBar(`<button class="btn btn-primary" onclick="advance()">${isLast?'Finish Course →':'Next Lesson →'}</button>`);
  } else {
    fb.textContent='Not quite. Check spacing, quotes, or semicolons.';
    setBar(`
      <button class="btn btn-ghost" onclick="wHint()">Hint</button>
      <button class="btn btn-danger" onclick="retryWrite()">Try Again</button>`);
  }
}
function retryWrite(){
  const ta=document.getElementById('ta');
  ta.classList.remove('ok','err'); ta.value='';
  document.getElementById('fb').className='fb';
  document.getElementById('wRes').innerHTML='';
  document.getElementById('wHint').innerHTML='';
  setBar(`
    <button class="btn btn-ghost" onclick="wHint()">Hint</button>
    <button class="btn btn-primary" id="cb" onclick="checkWrite()" disabled>Submit</button>`);
}
function wHint(){ document.getElementById('wHint').innerHTML=`<span>${L().write.answer}</span>`; }

function showDone(){
  document.getElementById('pFill').style.width='100%';
  document.getElementById('pLabel').textContent='Complete';
  document.getElementById('stagePips').innerHTML='';
  setBar('');
  const card=document.getElementById('card');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation='cardIn 0.22s ease-out';
  card.innerHTML=`
    <div class="done-screen">
      <span class="done-icon"></span>
      <h2>Course Complete</h2>
      <p>You have finished <strong>SQL Basics</strong> — SELECT, WHERE, and ORDER BY. You can now query, filter, and sort relational data.</p>
      <button class="btn btn-primary" onclick="restart()">Restart Course</button>
    </div>`;
}
function restart(){ li=0; si=0; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function setBar(html){ document.getElementById('actionBar').innerHTML=html; }

render();
</script>
